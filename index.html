<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5
        }

        button {
            font-size: 24px;
            padding: 15px;
            margin: 10px;
            width: 80%;
            border-radius: 10px
        }

        .start {
            background: #4CAF50;
            color: white
        }

        .dose {
            background: #2196F3;
            color: white
        }

        .reset {
            background: #f44336;
            color: white
        }

        .big {
            font-size: 32px;
            margin-top: 20px
        }

        .warning {
            color: red
        }
    </style>
</head>

<body>
    <h2>Lecigon Timer</h2>

    <input type="time" id="start"><br>
    <button class="start" onclick="startTimer()">START</button>

    <div class="big" id="eindtijd"></div>
    <div id="aftellen"></div>
    <div id="doses"></div>
    <div id="doseLog" style="white-space: pre-line; font-size:20px;"></div>

    <button class="dose" onclick="addDose()">+1 EXTRA DOSIS</button>
    <button class="dose" style="background:#ff9800;" onclick="removeLastDose()">- LAATSTE DOSIS</button>
    <button class="reset" onclick="reset()">RESET</button>

    <script>
        let state = JSON.parse(localStorage.getItem("lecigon")) || {
            startTime: null,
            doses: 0,
            doseLog: []
        };

        function save() {
            localStorage.setItem("lecigon", JSON.stringify(state));
        }

        function getEndTime() {
            if (!state.startTime) return null;
            return state.startTime + (18 * 3600000) - (state.doses * 3600000);
        }

        function startTimer() {
            if (state.startTime && !confirm("Timer loopt al. Opnieuw starten?")) return;

            let input = document.getElementById("start").value;

            // 👉 AUTO STARTTIJD
            if (!input) {
                let now = new Date();
                input = now.toTimeString().slice(0, 5);
                document.getElementById("start").value = input;
            }

            let now = new Date();
            let [h, m] = input.split(":").map(Number);

            let startDate = new Date();
            startDate.setHours(h, m, 0, 0);

            // if (startDate < now) startDate.setDate(startDate.getDate() + 1);
            // alleen als verschil > 12 uur (bijv. per ongeluk verkeerde dag)
            if (startDate < now && (now - startDate) > 12 * 3600000) {
                startDate.setDate(startDate.getDate() + 1);
            }

            state.startTime = startDate.getTime();
            state.doses = 0;
            state.doseLog = [];

            save();
        }

        function addDose() {
            if (!state.startTime) return;

            state.doses++;
            state.doseLog.push(new Date().toLocaleTimeString());

            save();
        }

        function reset() {
            if (!confirm("Weet je zeker dat je wilt resetten?")) return;

            state = {
                startTime: null,
                doses: 0,
                doseLog: []
            };

            localStorage.removeItem("lecigon");

            // 👉 UI direct leeg
            document.getElementById("start").value = "";
            document.getElementById("eindtijd").innerText = "";
            document.getElementById("aftellen").innerText = "";
            document.getElementById("doses").innerText = "Extra doses: 0";
            document.getElementById("doseLog").innerText = "";

        }
        function removeLastDose() {
            if (state.doseLog.length === 0) return;

            if (!confirm("Laatste dosis verwijderen?")) return;

            state.doses--;
            state.doseLog.pop();

            save();
        }

        function update() {
            let endTime = getEndTime();
            if (!endTime) return;

            let now = Date.now();
            let diff = endTime - now;

            if (diff <= 0) {
                document.getElementById("aftellen").innerText = "⚠️ Medicijn op!";
                document.getElementById("eindtijd").innerText = "";
                return;
            }

            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);

            let end = new Date(endTime);

            let hh = String(end.getHours()).padStart(2, '0');
            let mm = String(end.getMinutes()).padStart(2, '0');
            let ss = String(end.getSeconds()).padStart(2, '0');

            document.getElementById("eindtijd").innerText =
                "Eindtijd: " + hh + ":" + mm + ":" + ss;

            document.getElementById("aftellen").innerText =
                "Nog: " + h + "u " + m + "m " + s + "s";

            document.getElementById("doses").innerText =
                "Extra doses: " + state.doses;

            let logText = "Tijdlog extra doses:\n";

            for (let i = 0; i < state.doseLog.length; i++) {
                logText += (i + 1) + " - " + state.doseLog[i] + "\n";
            }

            document.getElementById("doseLog").innerText = logText;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>

</html>
