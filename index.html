<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Lecigon">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        button {
            font-size: 24px;
            padding: 15px;
            margin: 10px;
            width: 80%;
            border-radius: 10px;
        }

        .start {
            background: #4CAF50;
            color: white;
        }

        .dose {
            background: #2196F3;
            color: white;
        }

        .remove {
            background: #ff9800;
            color: white;
        }

        .reset {
            background: #f44336;
            color: white;
        }

        .big {
            font-size: 32px;
            margin-top: 20px;
        }

        .warning {
            color: red;
        }

        #doseLog {
            white-space: pre-line;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <h2>Lecigon Timer</h2>

    <input type="time" id="start" style="font-size:24px;padding:12px;width:70%;margin:10px 0;"><br>
    <button class="start" onclick="startTimer()">START</button>

    <div class="big" id="eindtijd"></div><br>
    <div id="aftellen"></div><br>
    <div id="doseLog"></div>

    <button class="dose" onclick="addDose()">+1 EXTRA DOSIS</button>
    <button class="remove" onclick="removeLastDose()">- LAATSTE DOSIS</button>
    <button class="reset" onclick="reset()">RESET</button>

    <script>
        let state = JSON.parse(localStorage.getItem("lecigon")) || {
            startTime: null,
            doses: 0,
            doseLog: [],
            warned: false
        };

        function save() {
            localStorage.setItem("lecigon", JSON.stringify(state));
        }

        function getEndTime() {
            if (!state.startTime) return null;
            return state.startTime + (18 * 3600000) - (state.doses * 3600000);
        }

        function startTimer() {
            if (state.startTime && !confirm("Timer loopt al. Opnieuw starten?")) return;

            let input = document.getElementById("start").value;

            if (input) {
                let [h, m] = input.split(":").map(Number);
                let startDate = new Date();
                startDate.setHours(h, m, 0, 0);
                state.startTime = startDate.getTime();
            } else {
                state.startTime = Date.now();
            }

            state.doses = 0;
            state.doseLog = [];
            state.warned = false;

            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }

            save();
        }

        function addDose() {
            if (!state.startTime) return;

            state.doses++;
            state.doseLog.push(new Date().toLocaleTimeString());

            save();
        }

        function removeLastDose() {
            if (state.doseLog.length === 0) return;

            let last = state.doseLog[state.doseLog.length - 1];
            if (!confirm("Verwijder dosis van " + last + "?")) return;

            state.doses--;
            state.doseLog.pop();

            save();
        }

        function reset() {
            if (!confirm("Weet je zeker dat je wilt resetten?")) return;

            state = {
                startTime: null,
                doses: 0,
                doseLog: [],
                warned: false
            };

            localStorage.removeItem("lecigon");

            document.getElementById("start").value = "";
            document.getElementById("eindtijd").innerText = "";
            document.getElementById("aftellen").innerText = "";
            document.getElementById("doseLog").innerText = "";
        }

        function update() {
            let endTime = getEndTime();
            if (!endTime) return;

            let now = Date.now();
            let diff = endTime - now;

            if (diff <= 0) {
                document.getElementById("aftellen").innerText = "⚠️ Medicijn op!";
                document.getElementById("eindtijd").innerText = "";
                return;
            }

            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);

            let end = new Date(endTime);

            let hh = String(end.getHours()).padStart(2, '0');
            let mm = String(end.getMinutes()).padStart(2, '0');
            let ss = String(end.getSeconds()).padStart(2, '0');

            document.getElementById("eindtijd").innerText =
                "Eindtijd: " + hh + ":" + mm + ":" + ss;

            document.getElementById("aftellen").innerText =
                "Nog: " + h + "u " + m + "m " + s + "s";

            // 🔔 1 uur notificatie
            if (diff <= 3600000 && diff > 0 && !state.warned) {

                state.warned = true;
                save();

                if (Notification.permission === "granted") {
                    new Notification("Lecigon Timer", {
                        body: "Nog 1 uur medicijn over!"
                    });
                }

                alert("⚠️ Nog 1 uur medicijn over!");

                try {
                    new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg").play();
                } catch (e) { }
            }

            // visuele warning
            if (diff <= 3600000) {
                document.body.style.background = "#ffcccc";
            } else {
                document.body.style.background = "#f5f5f5";
            }

            // log weergave
            let logText = "Extra doses:\n";

            for (let i = 0; i < state.doseLog.length; i++) {
                logText += (i + 1) + " - " + state.doseLog[i] + "\n";
            }

            // logText += (state.doseLog.length + 1) + " -";

            document.getElementById("doseLog").innerText = logText;
        }

        setInterval(update, 1000);
        update();

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
